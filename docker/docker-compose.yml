version: "3.9"
services:
  db:
    image: postgres:16
    container_name: parish_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: parish_admin
      POSTGRES_PASSWORD: localdevpassword   # Change in production
      POSTGRES_DB: parish_docs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: